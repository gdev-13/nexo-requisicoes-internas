<main class="register-page">
  <section class="register-card">
    <a class="brand" routerLink="/">
      <img src="/nexo-logo.png" alt="Logo Nexo" />

      <span>
        <small>Requisições internas</small>
      </span>
    </a>

    <div class="register-heading">
      <span>Primeiro acesso</span>
      <h1>Criar conta</h1>
      <p>
        Cadastre-se para abrir requisições internas, acompanhar solicitações e
        consultar o histórico de movimentações.
      </p>
    </div>

    <form class="register-form">
      <label>
        Nome
        <input type="text" placeholder="Seu nome completo" />
      </label>

      <label>
        E-mail
        <input type="email" placeholder="seuemail@exemplo.com" />
      </label>

      <label>
        Senha
        <input type="password" placeholder="Mínimo de 6 caracteres" />
      </label>

      <button type="button">Criar conta</button>
    </form>

    <p class="register-footer">
      Já tem uma conta?
      <a routerLink="/login">Entrar</a>
    </p>
  </section>
</main>
