@if (isOpen) {
  <div
    class="modal-backdrop"
    role="presentation"
    (click)="onBackdropClick($event)"
  >
    <section
      class="confirmation-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="confirmation-modal-title"
      aria-describedby="confirmation-modal-message"
    >
      <div class="modal-icon" [class.danger]="variant === 'danger'">
        @if (variant === 'danger') {
          !
        } @else {
          ?
        }
      </div>

      <div class="modal-content">
        <span>Confirmação</span>

        <h2 id="confirmation-modal-title">
          {{ title }}
        </h2>

        <p id="confirmation-modal-message">
          {{ message }}
        </p>

        @if (requiresComment) {
        <label class="modal-field">
            <span>{{ commentLabel }}</span>

            <textarea
            rows="5"
            [placeholder]="commentPlaceholder"
            [attr.maxlength]="commentMaxLength"
            [ngModel]="comment"
            (ngModelChange)="onCommentChange($event)"
            ></textarea>

            <div class="field-footer">
            @if (validationMessage) {
                <small class="field-error">
                {{ validationMessage }}
                </small>
            } @else {
                <span></span>
            }

            <small>
                {{ comment.length }}/{{ commentMaxLength }}
            </small>
            </div>
        </label>
        }
      </div>

      <div class="modal-actions">
        <button
          class="secondary-action"
          type="button"
          [disabled]="isProcessing"
          (click)="requestClose()"
        >
          {{ cancelLabel }}
        </button>

        <button
          class="confirm-action"
          type="button"
          [class.danger-action]="variant === 'danger'"
          [disabled]="isProcessing"
          (click)="confirm()"
        >
          {{ isProcessing ? processingLabel : confirmLabel }}
        </button>
      </div>
    </section>
  </div>
}
